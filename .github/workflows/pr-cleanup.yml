name: PR Cleanup

on:
  pull_request:
    types: [closed]
    branches:
      - dev

jobs:
  cleanup:
    name: Cleanup Preview Deployment
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Delete Cloudflare Worker deployment
        continue-on-error: true
        run: |
          pnpm exec wrangler delete \
            --name "preview-${{ github.event.pull_request.number }}-${GITHUB_REPOSITORY##*/}" \
            --force
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Mark GitHub deployments as inactive
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const environment = `preview-pr-${prNumber}`;
            
            // Get all deployments for this environment
            const { data: deployments } = await github.rest.repos.listDeployments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              environment: environment,
            });
            
            // Mark all deployments as inactive
            for (const deployment of deployments) {
              await github.rest.repos.createDeploymentStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: deployment.id,
                state: 'inactive',
              });
            }
            
            console.log(`Marked ${deployments.length} deployment(s) as inactive`);

      - name: Delete GitHub environment
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const environment = `preview-pr-${prNumber}`;
            
            try {
              await github.rest.repos.deleteAnEnvironment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                environment_name: environment,
              });
              console.log(`Deleted environment: ${environment}`);
            } catch (error) {
              console.log(`Could not delete environment: ${error.message}`);
            }

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            
            const comment = `## 🧹 Preview Cleanup
            
            The preview deployment for this PR has been cleaned up.
            
            Environment: \`preview-pr-${prNumber}\`
            Status: Deleted
            `;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: comment,
            });
